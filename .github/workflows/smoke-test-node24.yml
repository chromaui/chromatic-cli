name: Smoke test via Node 24

on:
  workflow_call:
    inputs:
      version:
        description: Canary version to exercise (matches chromaui/action-canary tag).
        required: true
        type: string
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - run: yarn
        working-directory: test-fixtures/storybook-smoke
      # `uses:` cannot evaluate `${{ inputs.* }}` (resolved at workflow load,
      # before runtime context exists). Clone the published canary at the
      # requested tag into a local path, then reference that path.
      - name: Checkout chromaui/action-canary@v${{ inputs.version }}
        uses: actions/checkout@v5
        with:
          repository: chromaui/action-canary
          ref: v${{ inputs.version }}
          path: .action-canary
      - uses: ./.action-canary
        with:
          buildScriptName: build-test-storybook
          exitZeroOnChanges: true
          forceRebuild: true
          onlyChanged: true
          workingDir: test-fixtures/storybook-smoke
        env:
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
