name: Release

on:
  # Pushes to main trigger the `latest` release on npm and publish the GitHub
  # Action. To allow the occasional update to markdown and config files, only
  # changes to actual source code trigger a release.
  push:
    branches:
      - main
    paths:
      - action-src/**
      - bin-src/**
      - node-src/**
      - action.yml
      - isChromatic.*
      - package.json
      - storybook-addon.*

  # Per-PR canary publishing dispatches into this workflow via workflow_call so
  # that npm trusted publishing (scoped to a single workflow file) covers both
  # the canary and `latest` paths under one entry.
  workflow_call:
    outputs:
      version:
        description: Version published to npm and chromaui/action-canary.
        value: ${{ jobs.release.outputs.version }}
    secrets:
      GH_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare repository
        run: git fetch --unshallow --tags
      # Update NPM since we're using trusted publishing and need a newer version
      - name: Update NPM
        run: npm install -g npm@latest
      - name: Install dependencies
        run: yarn install --immutable
      - name: Create release
        id: release
        run: yarn ${{ github.event_name == 'push' && 'release' || 'release-canary' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SENTRY_ORG: chromatic-lt
          SENTRY_PROJECT: cli
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
