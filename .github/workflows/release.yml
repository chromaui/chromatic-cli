name: Publish

on:
  # Pushes to main trigger the `latest` npm release and publish the GitHub
  # Action. To allow the occasional update to markdown and config files, only
  # changes to actual source code trigger a publish.
  push:
    branches:
      - main
    paths:
      - action-src/**
      - bin-src/**
      - node-src/**
      - action.yml
      - isChromatic.*
      - package.json
      - storybook-addon.*
  # npm trusted publishing is scoped to a single workflow filename, so PR
  # canaries must be published directly from this workflow rather than via
  # workflow_call from another file.
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - action-src/**
      - bin-src/**
      - node-src/**
      - action.yml
      - isChromatic.*
      - package.json
      - storybook-addon.*
  merge_group:
    types:
      - checks_requested

permissions:
  id-token: write
  contents: write
  pull-requests: write

# Cancel stale PR publish runs so we do not fan out smoke tests for canaries
# that have already been superseded. Merge-queue and main publishes must run to
# completion.
concurrency:
  group: publish-workflow-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  package-size:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/package-size.yml
    needs: preflight
    permissions:
      contents: read
      issues: write
      pull-requests: write
    secrets:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}

  preflight:
    if: github.event_name != 'push'
    uses: ./.github/workflows/lint-and-test.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  chromatic:
    if: github.event_name != 'push'
    needs: preflight
    uses: ./.github/workflows/chromatic-prod.yml
    secrets:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  publish:
    if: always() && (github.event_name == 'push' || needs.preflight.result == 'success')
    needs:
      - preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.publish.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare repository
        run: git fetch --unshallow --tags
      # Update NPM since we're using trusted publishing and need a newer version
      - name: Update NPM
        run: npm install -g npm@latest
      - name: Install dependencies
        run: yarn install --immutable
      - name: Publish package and action
        id: publish
        run: yarn ${{ github.event_name == 'push' && 'release' || 'release-canary' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SENTRY_ORG: chromatic-lt
          SENTRY_PROJECT: cli
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  # These smoke tests live in the trusted-publishing workflow on purpose: the
  # canary must be published from this exact workflow file for npm OIDC to
  # accept it, so the verification jobs need to fan out after publish here.
  smoke-test-action:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-action.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-node-api:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-node-api.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-node-20:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-node20.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-node-22:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-node22.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-node-24:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-node24.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-npx:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-npx.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-windows:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-windows.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-yarn:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-yarn.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-yarn-berry:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-yarn-berry.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-yarn-canary:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-yarn-canary.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-yarn-classic:
    if: github.event_name != 'push'
    uses: ./.github/workflows/smoke-test-yarn-classic.yml
    needs: publish
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
