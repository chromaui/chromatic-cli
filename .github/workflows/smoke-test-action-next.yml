name: Smoke test via action next
on: merge_group

permissions:
  contents: read

jobs:
  smoke-test-action-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: "22.22.3"
          cache: yarn
      - run: yarn
      - name: Push to action-next
        run: yarn run release-next
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: Build and pack the CLI
        run: |
          yarn build
          yarn pack --out chromatic.tgz
      - name: Copy fixture outside the repo
        # We copy the fixture outside the repo so the test can stand alone without falling back to the repo's node_modules
        run: |
          cp -r smoke-tests "$RUNNER_TEMP/smoke-tests"
          cp chromatic.tgz "$RUNNER_TEMP/chromatic.tgz"
          git -C "$RUNNER_TEMP/smoke-tests" init --quiet
          git -C "$RUNNER_TEMP/smoke-tests" config user.email smoke@chromatic.com
          git -C "$RUNNER_TEMP/smoke-tests" config user.name "Smoke Test"

          git -C "$RUNNER_TEMP/smoke-tests" add -A
          git -C "$RUNNER_TEMP/smoke-tests" commit --quiet -m "Smoke test fixture"
          git -C "$RUNNER_TEMP/smoke-tests" commit --quiet --allow-empty -m "Second commit so Chromatic can find a baseline"
      - name: Install fixture deps
        working-directory: ${{ runner.temp }}/smoke-tests
        run: |
          corepack enable
          yarn set version 4.2.2
          yarn install
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
      - name: Run build against action-next
        uses: chromaui/action-next@latest
        with:
          workingDir: ${{ runner.temp }}/smoke-tests
          buildScriptName: build-storybook
          exitZeroOnChanges: true
          forceRebuild: true
        env:
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
