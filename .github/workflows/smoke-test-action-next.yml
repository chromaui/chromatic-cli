name: Smoke test via action next
on: merge_group

permissions:
  contents: read

jobs:
  smoke-test-action-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - run: yarn
      - name: Push to action-next
        run: yarn run release-next
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: yarn
        working-directory: test-fixtures/storybook-smoke
      - run: yarn build-test-storybook
        working-directory: test-fixtures/storybook-smoke
      - name: Run build against action-next
        uses: chromaui/action-next@latest
        with:
          exitZeroOnChanges: true
          forceRebuild: true
          storybookBaseDir: test-fixtures/storybook-smoke
          storybookBuildDir: test-storybook
          workingDir: test-fixtures/storybook-smoke
        env:
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
