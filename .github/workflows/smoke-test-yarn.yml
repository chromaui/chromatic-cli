name: Smoke test via yarn

on:
  workflow_call:
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: "22.22.3"
      - name: Build and pack the CLI
        run: |
          yarn
          yarn build
          yarn pack --out chromatic.tgz
      - name: Install fixture with yarn and run chromatic
        working-directory: smoke-tests
        run: |
          # empty lockfile makes yarn treat smoke-tests as a standalone project, not the CLI repo's workspace
          touch yarn.lock
          corepack enable
          yarn set version 4.2.2
          yarn install
          yarn chromatic --build-script-name build-storybook --exit-zero-on-changes --force-rebuild
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
