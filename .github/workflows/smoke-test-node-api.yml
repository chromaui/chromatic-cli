name: Smoke test via node api

on:
  workflow_call:
    inputs:
      version:
        description: Canary version to exercise (matches chromatic@<version> on npm).
        required: true
        type: string
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
      - run: yarn
      - name: install published canary
        run: yarn add chromatic@${{ inputs.version }}
      - name: run chromatic via node
        run: ./scripts/runViaNode.mjs
        env:
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
