name: Smoke test via node api

on:
  workflow_call:
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
      - name: Build and pack the CLI
        run: |
          yarn
          yarn build
          yarn pack --out chromatic.tgz
      - name: Install fixture deps
        working-directory: smoke-tests
        run: |
          # empty lockfile makes yarn treat smoke-tests as a standalone project, not the CLI repo's workspace
          touch yarn.lock
          corepack enable
          yarn set version 4.2.2
          yarn install
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
      - name: Run chromatic via node api against the fixture
        working-directory: smoke-tests
        run: node ../scripts/run-via-node.mjs
        env:
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
