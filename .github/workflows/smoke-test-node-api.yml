name: Smoke test via node api

on:
  workflow_call:
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
      - name: Build and pack the CLI
        run: |
          yarn
          yarn build
          yarn pack --out chromatic.tgz
      - name: Copy fixture outside the repo
        # outside the repo tree, a missing dependency fails instead of resolving upward to the repo's node_modules
        run: |
          cp -r smoke-tests "$RUNNER_TEMP/smoke-tests"
          cp chromatic.tgz "$RUNNER_TEMP/chromatic.tgz"
          git -C "$RUNNER_TEMP/smoke-tests" init --quiet
          git -C "$RUNNER_TEMP/smoke-tests" add -A
          git -C "$RUNNER_TEMP/smoke-tests" -c user.email=smoke@chromatic.com -c user.name="Smoke Test" commit --quiet -m "Smoke test fixture"
          git -C "$RUNNER_TEMP/smoke-tests" -c user.email=smoke@chromatic.com -c user.name="Smoke Test" commit --quiet --allow-empty -m "Second commit so Chromatic can find a baseline"
      - name: Install fixture deps
        working-directory: ${{ runner.temp }}/smoke-tests
        run: |
          corepack enable
          yarn set version 4.2.2
          yarn install
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
      - name: Run chromatic via node api against the fixture
        working-directory: ${{ runner.temp }}/smoke-tests
        run: node run-via-node.mjs
        env:
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
