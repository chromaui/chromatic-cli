name: Smoke test via yarn on Windows

on:
  workflow_call:
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  self-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: "22.22.3"
      - name: Build and pack the renamed CLI
        run: |
          yarn
          node ./scripts/rename.js storybook-chromatic
          # re-install so yarn's resolution matches the renamed package before packing
          yarn
          yarn build
          yarn pack --out storybook-chromatic.tgz
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
      - name: Copy fixture outside the repo
        # outside the repo tree, a missing dependency fails instead of resolving upward to the repo's node_modules
        shell: bash
        run: |
          cp -r smoke-tests "$RUNNER_TEMP/smoke-tests"
          cp storybook-chromatic.tgz "$RUNNER_TEMP/storybook-chromatic.tgz"
          git -C "$RUNNER_TEMP/smoke-tests" init --quiet
          git -C "$RUNNER_TEMP/smoke-tests" add -A
          git -C "$RUNNER_TEMP/smoke-tests" -c user.email=smoke@chromatic.com -c user.name="Smoke Test" commit --quiet -m "Smoke test fixture"
          git -C "$RUNNER_TEMP/smoke-tests" -c user.email=smoke@chromatic.com -c user.name="Smoke Test" commit --quiet --allow-empty -m "Second commit so Chromatic can find a baseline"
      - name: Install fixture with yarn and run chromatic
        working-directory: ${{ runner.temp }}/smoke-tests
        shell: bash
        run: |
          corepack enable
          yarn set version 4.2.2
          yarn add chromatic@file:../storybook-chromatic.tgz
          yarn chromatic --build-script-name build-storybook --exit-zero-on-changes --force-rebuild
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
