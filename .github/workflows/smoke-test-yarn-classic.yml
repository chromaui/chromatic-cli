name: Smoke test via yarn classic

on:
  workflow_call:
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: "22.22.3"
      - name: Build and pack the CLI
        run: |
          yarn
          yarn build
          yarn pack --out chromatic.tgz
      - name: Install fixture with yarn classic and run chromatic
        working-directory: smoke-tests
        run: |
          corepack enable
          yarn set version 1.22.22
          yarn install --ignore-engines
          npx chromatic --build-script-name build-storybook --exit-zero-on-changes --force-rebuild
        env:
          LOG_LEVEL: debug
          DEBUG: chromatic-cli
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
