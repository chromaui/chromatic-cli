name: Test PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_run:
    workflows:
      - Publish
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  package-size:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/package-size.yml
    permissions:
      contents: read
      issues: write
      pull-requests: write
    secrets:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}

  resolve-version:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event != 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Download published version artifact
        uses: actions/download-artifact@v4
        with:
          name: published-version
          path: ./published-version
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Read published version
        id: version
        run: |
          VERSION="$(tr -d '\n' < ./published-version/published-version.txt)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  smoke-test-action:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-action.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-node-api:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-node-api.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-node-20:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-node20.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-node-22:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-node22.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-node-24:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-node24.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-npx:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-npx.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-windows:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-windows.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-yarn:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-yarn.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-yarn-berry:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-yarn-berry.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-yarn-canary:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-yarn-canary.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}

  smoke-test-yarn-classic:
    if: needs.resolve-version.result == 'success'
    uses: ./.github/workflows/smoke-test-yarn-classic.yml
    needs: resolve-version
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN: ${{ secrets.SMOKE_TESTS_CHROMATIC_PROJECT_TOKEN }}
